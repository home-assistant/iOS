name: Update Material Design Icons
on:
  workflow_dispatch:
  schedule:
    # Weekly. Checks for a newer MaterialDesignIcons release; if there is one it
    # bumps the pinned version, regenerates the font, and opens a PR.
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  BUNDLE_PATH: vendor/bundle

jobs:
  update_icons:
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ssh-key: ${{ secrets.HOMEASSISTANT_SSH_DEPLOY_KEY }}

      - name: Install Gems
        run: bundle install --jobs 4 --retry 3

      - name: Install Pods
        run: ONLY_SUPPORT_MODULES=1 bundle exec pod install --repo-update

      - name: Bump Material Design Icons to latest
        run: ./Tools/BuildMaterialDesignIconsFont.sh --bump

      - name: Commit changes
        id: commit
        run: |
          git config --global user.name 'Home Assistant Bot'
          git config --global user.email 'hello@home-assistant.io'
          VERSION=$(sed -n 's/^MDI_VERSION=//p' Tools/BuildMaterialDesignIconsFont.sh)
          git add Tools/BuildMaterialDesignIconsFont.sh
          git add Tools/MaterialDesignIcons.ttf Tools/MaterialDesignIcons.json
          git add Sources/Shared/Iconic/MaterialDesignIcons.swift
          if ! git diff --cached --quiet; then
            git commit -m "Bump MaterialDesignIcons to $VERSION"
          fi
          git checkout -- .
          git clean -xfd
          echo "pr_title=$(git log -1 --pretty='%s')" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          base: main
          branch: create-pull-request/bump_material_design_icons
          title: ${{ steps.commit.outputs.pr_title }}
          body: "Automatically created by ${{ github.actor }}."
