name: "Lokalise: Delete Keys"
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      keys:
        description: "Key names to delete (comma or newline separated). Must match exactly."
        required: true
        type: string
      dry_run:
        description: "Dry run: only list the keys that would be deleted."
        required: false
        type: boolean
        default: true
      confirmation:
        description: "Type DELETE to confirm. Required when dry_run is false."
        required: false
        type: string

permissions:
  contents: read

jobs:
  delete_keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Delete keys from Lokalise
        run: bundle exec fastlane delete_lokalise_keys
        env:
          HOMEASSISTANT_LOKALIZE_PROJECT_ID: ${{ secrets.HOMEASSISTANT_LOKALIZE_PROJECT_ID }}
          HOMEASSISTANT_LOKALIZE_TOKEN: ${{ secrets.LOKALISE_TOKEN }}
          LOKALISE_DELETE_KEYS: ${{ inputs.keys }}
          LOKALISE_DELETE_DRY_RUN: ${{ inputs.dry_run }}
          LOKALISE_DELETE_CONFIRMATION: ${{ inputs.confirmation }}

  # Only after a real (non-dry-run) deletion succeeds: remove the same keys from
  # the local Localizable.strings files, regenerate Strings.swift via SwiftGen,
  # and open a PR. Uses the default GITHUB_TOKEN (same as download_localized_strings).
  open_cleanup_pr:
    needs: delete_keys
    if: ${{ inputs.dry_run == false }}
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ssh-key: ${{ secrets.HOMEASSISTANT_SSH_DEPLOY_KEY }}
      - name: Install Gems
        run: bundle install --jobs 4 --retry 3
      - name: Install Pods
        run: ONLY_SUPPORT_MODULES=1 bundle exec pod install --repo-update
      - name: Remove keys from Localizable.strings and regenerate
        run: bundle exec fastlane delete_local_strings
        env:
          LOKALISE_DELETE_KEYS: ${{ inputs.keys }}
      - name: Commit changes
        run: |
          git config --global user.name 'Home Assistant Bot'
          git config --global user.email 'hello@home-assistant.io'
          git add Sources/\*.strings
          git add Sources/\*.swift
          git commit -m "Delete unused localized strings" || true
          git checkout -- .
          git clean -xfd
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          base: main
          branch: create-pull-request/delete_lokalise_keys
          title: "Delete unused localized strings"
          body: |
            Automatically created by @${{ github.actor }} after deleting these keys from Lokalise:
            ```
            ${{ inputs.keys }}
            ```
