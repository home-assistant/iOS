name: Bug report (Experimental mTLS)
description: Report connection issues when using the experimental mTLS feature
title: "[mTLS] "
labels:
  - bug
  - ios
body:
  - type: markdown
    attributes:
      value: |
        ## Experimental mTLS bug report

        Use this form only for issues related to the experimental `mTLS` connection feature.

        Please remove or mask sensitive values (tokens, private keys, public URLs, IPs) before submitting.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I am using the experimental mTLS feature
          required: true
        - label: I have reproduced this issue at least once after restarting the app
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: App platform
      options:
        - iOS
        - iPadOS
        - macOS
    validations:
      required: true

  - type: textarea
    id: app_and_device
    attributes:
      label: Device and app information
      description: Include exact values from system settings and app about screen.
      placeholder: |
        Model Name:
        Device Identifier (optional):
        OS Version:
        App Version (including build number):
    validations:
      required: true

  - type: textarea
    id: ha_environment
    attributes:
      label: Home Assistant environment
      placeholder: |
        Home Assistant Core Version:
        Supervisor Version (if applicable):
        Installation Type (HAOS, Container, Core, Supervised):
        Host OS:
        Reverse Proxy (none/nginx/Traefik/Caddy/Cloudflare/other):
        TLS Termination Point (HA/proxy/other):
    validations:
      required: true

  - type: textarea
    id: mtls_setup
    attributes:
      label: mTLS setup details
      description: Provide certificate and trust-chain setup without sharing private keys.
      placeholder: |
        Client certificate source (generated by HA/external CA):
        Client certificate format (PKCS#12/PEM/etc):
        Certificate validity window (not before/not after):
        Signing CA type (public/private/self-signed):
        Server certificate issuer:
        Full chain served by server? (yes/no/unknown):
    validations:
      required: true

  - type: textarea
    id: failure_symptoms
    attributes:
      label: Failure symptoms
      placeholder: |
        Exact error message shown in app:
        Error code (if any):
        When does it fail? (initial connect/background refresh/websocket upgrade/etc):
        Frequency (always/intermittent):
        Time of most recent failure (with timezone):
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs actual behavior
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: extra_context
    attributes:
      label: Additional context
      description: Include screenshots or screen recordings if helpful.
    validations:
      required: false
